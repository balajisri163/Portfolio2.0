services:
  - type: web
    name: balaji-portfolio
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn personal_website.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --log-file -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"